version: '3.8'

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: airport_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./Backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/airport_analytics
      SECRET_KEY: your_secret_key_here
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build: ./Frontend/aeroflow-ui
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:

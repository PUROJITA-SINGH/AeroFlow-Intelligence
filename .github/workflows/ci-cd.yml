name: AeroFlow CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd Backend
          pip install -r requirements.txt

      - name: Check all backend files exist
        run: |
          test -f Backend/main.py         && echo "✅ main.py"
          test -f Backend/database.py     && echo "✅ database.py"
          test -f Backend/auth.py         && echo "✅ auth.py"
          test -f Backend/alert_engine.py && echo "✅ alert_engine.py"
          test -f Backend/simulator.py    && echo "✅ simulator.py"

      - name: Validate Python syntax
        run: |
          cd Backend
          python -m py_compile main.py
          python -m py_compile database.py
          python -m py_compile auth.py
          python -m py_compile alert_engine.py
          python -m py_compile simulator.py
          echo "✅ All Python files valid"

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd Frontend/aeroflow-ui
          npm install

      - name: Build React app
        run: |
          cd Frontend/aeroflow-ui
          npm run build
          echo "✅ React build successful"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Docker image
        run: |
          docker build ./Backend -t aeroflow-api:latest
          echo "✅ Backend Docker image built"

      - name: Build Frontend Docker image
        run: |
          docker build ./Frontend/aeroflow-ui -t aeroflow-frontend:latest
          echo "✅ Frontend Docker image built"

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check .env is not committed
        run: |
          ! test -f .env
          echo "✅ .env file not committed"

      - name: Check .gitignore exists
        run: |
          test -f .gitignore
          echo "✅ .gitignore present"
